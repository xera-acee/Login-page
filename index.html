<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Marking</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1C1C1E;
            color: #FFFFFF;
        }

        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #3C3C3E;
            border-radius: 5px;
            background: #2C2C2E;
            color: #FFFFFF;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0066CC;
            color: #FFFFFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005BB5;
        }

        nav {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        nav button {
            width: auto;
        }
    </style>
</head>
<body class="dark-mode">
    <div class="container">
        <div class="login" id="login">
            <h1>Login</h1>
            <input type="text" placeholder="Username" id="username">
            <input type="password" placeholder="Password" id="password">
            <button onclick="login()">Login</button>
            <p><a href="#">Forgot Password?</a></p>
        </div>

        <div class="dashboard" id="dashboard" style="display: none;">
            <h1>Dashboard</h1>
            <nav>
                <button onclick="showAttendance()">Attendance</button>
                <button onclick="showReport()">Reports</button>
                <button onclick="showProfile()">Profile</button>
            </nav>
            <div id="content"></div>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username && password) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert('Please enter username and password.');
            }
        }

        function showAttendance() {
            const content = `
                <h2>Attendance</h2>
                <select id="classSelect">
                    <option>Class 1</option>
                    <option>Class 2</option>
                </select>
                <ul>
                    <li><input type="checkbox"> Student 1</li>
                    <li><input type="checkbox"> Student 2</li>
                </ul>
                <button onclick="saveAttendance()">Save Attendance</button>
            `;
            document.getElementById('content').innerHTML = content;
        }

        function showReport() {
            const content = `<h2>Attendance Reports</h2><p>Coming soon...</p>`;
            document.getElementById('content').innerHTML = content;
        }

        function showProfile() {
            const content = `<h2>Profile</h2><p>Your profile details...</p>`;
            document.getElementById('content').innerHTML = content;
        }

        function saveAttendance() {
            alert('Attendance saved!');
        }
    </script>
</body>
</html>
